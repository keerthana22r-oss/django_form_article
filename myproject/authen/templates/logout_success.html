{% extends 'main.html' %}
{% block content %}

<div class="container mt-5 pt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-lg border-0 rounded-4 text-center overflow-hidden">
                <div class="card-body p-5">
                    <div class="mb-4">
                        <div class="success-icon mx-auto mb-3">
                            <i class="fas fa-check-circle fa-4x text-success"></i>
                        </div>
                        <h3 class="fw-bold">Logged Out Successfully!</h3>
                        <p class="text-muted mt-2">
                            Thank you for using ArticleHub.<br>
                            We hope to see you again soon!
                        </p>
                    </div>
                    
                    <div class="d-grid gap-2">
                        <a href="{% url 'signin' %}" class="btn-gradient btn btn-lg">
                            <i class="fas fa-sign-in-alt me-2"></i>Login Again
                        </a>
                        <a href="{% url 'read_article' %}" class="btn btn-outline-secondary btn-lg">
                            <i class="fas fa-home me-2"></i>Return to Homepage
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.success-icon {
    animation: scaleIn 0.5s ease;
}

@keyframes scaleIn {
    from {
        transform: scale(0);
        opacity: 0;
    }
    to {
        transform: scale(1);
        opacity: 1;
    }
}
</style>

{% endblock %}
