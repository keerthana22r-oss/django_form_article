{% extends "main.html" %}
{% block content %}

<div class="container fade-up" data-aos="fade-up">
    <div class="row justify-content-center align-items-center min-vh-80">
        <div class="col-md-6 col-lg-5">
            <div class="card shadow-lg border-0 rounded-4 overflow-hidden">
                <!-- Decorative Header -->
                <div class="bg-gradient-primary p-4 text-center">
                    <div class="mb-3">
                        <i class="fas fa-newspaper fa-3x text-white"></i>
                    </div>
                    <h3 class="text-white mb-0 fw-bold">Welcome Back!</h3>
                    <p class="text-white-50 mt-2 mb-0">Sign in to continue to ArticleHub</p>
                </div>
                
                <div class="card-body p-5">
                    <!-- Social Login Options (Optional) -->
                    <div class="text-center mb-4">
                        <p class="text-muted mb-3">Sign in with</p>
                        <div class="d-flex justify-content-center gap-2">
                            <button class="btn btn-outline-danger rounded-circle p-2" style="width: 40px; height: 40px;">
                                <i class="fab fa-google"></i>
                            </button>
                            <button class="btn btn-outline-primary rounded-circle p-2" style="width: 40px; height: 40px;">
                                <i class="fab fa-facebook-f"></i>
                            </button>
                            <button class="btn btn-outline-dark rounded-circle p-2" style="width: 40px; height: 40px;">
                                <i class="fab fa-github"></i>
                            </button>
                        </div>
                        <div class="position-relative my-4">
                            <hr>
                            <span class="position-absolute top-50 start-50 translate-middle bg-white px-3 text-muted">or</span>
                        </div>
                    </div>
                    
                    <!-- Login Form -->
                    <form method="POST">
                        {% csrf_token %}
                        
                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                <i class="fas fa-user text-primary me-2"></i>Username
                            </label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0">
                                    <i class="fas fa-envelope text-muted"></i>
                                </span>
                                <input type="text" name="username" class="form-control border-start-0" 
                                       placeholder="Enter your username" required autofocus>
                            </div>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                <i class="fas fa-lock text-primary me-2"></i>Password
                            </label>
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0">
                                    <i class="fas fa-key text-muted"></i>
                                </span>
                                <input type="password" name="password" class="form-control border-start-0" 
                                       placeholder="Enter your password" required id="password">
                                <button class="btn btn-outline-secondary border-start-0" type="button" id="togglePassword">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                        
                        <div class="mb-4 d-flex justify-content-between align-items-center">
                            <div class="form-check">
                                <input type="checkbox" class="form-check-input" id="rememberMe">
                                <label class="form-check-label text-muted" for="rememberMe">
                                    Remember me
                                </label>
                            </div>
                            <a href="#" class="text-decoration-none small">Forgot password?</a>
                        </div>
                        
                        <button type="submit" class="btn-gradient btn w-100 py-2 mb-3">
                            <i class="fas fa-sign-in-alt me-2"></i>Sign In
                        </button>
                        
                        <div class="text-center">
                            <p class="text-muted mb-0">
                                Don't have an account? 
                                <a href="{% url 'signup' %}" class="text-decoration-none fw-semibold">
                                    Create Account <i class="fas fa-arrow-right ms-1"></i>
                                </a>
                            </p>
                        </div>
                    </form>
                </div>
            </div>
            
            <!-- Additional Info -->
            <div class="text-center mt-4">
                <small class="text-white-50">
                    <i class="fas fa-shield-alt me-1"></i>
                    Secure login • Your privacy is protected
                </small>
            </div>
        </div>
    </div>
</div>

<style>
.min-vh-80 {
    min-height: 80vh;
}

.bg-gradient-primary {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
}

.input-group-text {
    background-color: white;
    border-right: none;
}

.form-control:focus {
    border-color: #667eea;
    box-shadow: none;
}

.input-group:focus-within {
    box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
    border-radius: 8px;
}

.input-group:focus-within .input-group-text,
.input-group:focus-within .form-control {
    border-color: #667eea;
}

/* Remember me checkbox styling */
.form-check-input:checked {
    background-color: #667eea;
    border-color: #667eea;
}

/* Animation for card */
.card {
    animation: slideUp 0.6s ease;
}

@keyframes slideUp {
    from {
        opacity: 0;
        transform: translateY(30px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

/* Button hover effect */
.btn-gradient {
    transition: all 0.3s ease;
}

.btn-gradient:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
}
</style>

<script>
// Password visibility toggle
document.getElementById('togglePassword')?.addEventListener('click', function() {
    const passwordInput = document.getElementById('password');
    const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
    passwordInput.setAttribute('type', type);
    this.querySelector('i').classList.toggle('fa-eye');
    this.querySelector('i').classList.toggle('fa-eye-slash');
});
</script>

{% endblock %}
