{% extends 'main.html' %}
{% block content %}

<div class="container fade-up" data-aos="fade-up">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
                <!-- Header with Success Gradient -->
                <div class="bg-gradient-success p-4 text-white text-center">
                    <div class="mb-3">
                        <i class="fas fa-trash-restore fa-4x"></i>
                    </div>
                    <h3 class="mb-0 fw-bold">Restore Article</h3>
                    <p class="mb-0 opacity-75">Bring back this article</p>
                </div>
                
                <div class="card-body p-4 text-center">
                    <!-- Restore Icon -->
                    <div class="restore-icon mb-4">
                        <i class="fas fa-undo-alt fa-3x text-success"></i>
                    </div>
                    
                    <h4 class="mb-3">Restore "{{ data.title }}"?</h4>
                    <p class="text-muted mb-4">
                        This article will be restored to your active articles list.
                    </p>
                    
                    <div class="alert alert-info mb-4">
                        <i class="fas fa-info-circle me-2"></i>
                        The article will be visible to all users after restoration
                    </div>
                    
                    <form method="POST">
                        {% csrf_token %}
                        <div class="d-flex gap-3 justify-content-center">
                            <a href="{% url 'history_article' %}" class="btn btn-outline-secondary btn-lg px-4">
                                <i class="fas fa-times me-2"></i>Cancel
                            </a>
                            <button type="submit" class="btn btn-success btn-lg px-4">
                                <i class="fas fa-check-circle me-2"></i>Yes, Restore
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.bg-gradient-success {
    background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
}

.restore-icon {
    animation: bounce 1s ease infinite;
}

@keyframes bounce {
    0%, 100% {
        transform: translateY(0);
    }
    50% {
        transform: translateY(-10px);
    }
}

.btn-success {
    background: linear-gradient(135deg, #28a745, #20c997);
    border: none;
    transition: all 0.3s ease;
}

.btn-success:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
}
</style>

{% endblock %}
